<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Support Enjeeoh</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/theme.js"></script>
<style>
  :root{--accent:#0F9D7A;--accent2:#11B98F;--bg:#FBFBFE;--fg:#15162A;--muted:#6C6F84;--card:#FFF;--line:#ECEDF4;--soft:#F4F4FA;--shadow:0 24px 60px rgba(12,14,40,.16)}
  .dark{--bg:#0C0D17;--fg:#F3F4FB;--muted:#9DA1B8;--card:#16182A;--line:#242639;--soft:#1B1D2E;--shadow:0 24px 60px rgba(0,0,0,.5)}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .nav{max-width:760px;margin:0 auto;padding:22px 24px;display:flex;justify-content:space-between;align-items:center}
  .nav .logo{font:700 18px 'Space Grotesk'} .nav a{color:var(--fg);text-decoration:none;font:600 14px Inter}
  .wrap{max-width:560px;margin:0 auto;padding:18px 24px 70px}
  .glow{position:fixed;top:-60px;left:50%;transform:translateX(-50%);width:520px;height:360px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--accent) 18%,transparent),transparent 70%);filter:blur(12px);pointer-events:none;z-index:0}
  .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:32px 30px;box-shadow:var(--shadow)}
  .heart{width:46px;height:46px;border-radius:13px;background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  h1{font:700 28px/1.12 'Space Grotesk';letter-spacing:-.01em;margin:0 0 10px}
  .blurb{color:var(--muted);font:400 15px/1.6 Inter;margin:0 0 12px}
  .disclaimer{font:400 12.5px/1.55 Inter;color:var(--muted);background:var(--soft);border-left:3px solid color-mix(in srgb,var(--accent) 50%,var(--line));border-radius:8px;padding:11px 13px;margin:0 0 22px}
  .toggle{display:inline-flex;background:var(--soft);border-radius:11px;padding:3px;margin-bottom:18px}
  .toggle button{border:0;background:transparent;color:var(--muted);font:600 13px Inter;padding:8px 16px;border-radius:9px;cursor:pointer}
  .toggle button.on{background:var(--card);color:var(--fg);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .amounts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .amt{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:14px 6px;font:600 16px 'Space Grotesk';color:var(--fg);cursor:pointer;transition:.12s}
  .amt:hover{border-color:var(--accent)} .amt.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 16px color-mix(in srgb,var(--accent) 32%,transparent)}
  .custom{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:0 14px;margin-bottom:22px}
  .custom span{color:var(--muted);font:600 16px 'Space Grotesk'} .custom input{flex:1;border:0;background:transparent;color:var(--fg);font:600 16px 'Space Grotesk';padding:14px 0;outline:none}
  .give{width:100%;background:var(--accent);color:#fff;border:0;border-radius:13px;padding:16px;font:600 16px Inter;cursor:pointer;text-decoration:none;display:block;text-align:center;box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 36%,transparent);transition:transform .15s}
  .give:hover{transform:translateY(-2px)}
  .alts{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .alt{flex:1;min-width:130px;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px;font:600 13px Inter;color:var(--fg);text-decoration:none;text-align:center;cursor:pointer;transition:border-color .12s} .alt:hover{border-color:var(--accent)}
  .safe{display:flex;align-items:flex-start;gap:8px;margin-top:20px;color:var(--muted);font:400 12.5px/1.5 Inter}
  .safe svg{flex:0 0 auto;margin-top:1px;color:var(--accent)}
  .none{background:var(--soft);border-radius:12px;padding:16px;color:var(--muted);font:400 14px/1.5 Inter;text-align:center}
  .oss{text-align:center;color:var(--muted);font:400 12.5px Inter;margin-top:22px}
  .oss a{color:var(--accent)}
  /* reviewer edit */
  .editbtn{position:fixed;right:18px;bottom:18px;z-index:40;background:var(--card);border:1px solid var(--line);color:var(--fg);border-radius:11px;padding:10px 15px;font:600 13px Inter;cursor:pointer;box-shadow:var(--shadow)}
  .modal{position:fixed;inset:0;background:rgba(8,10,22,.5);z-index:90;display:none;align-items:center;justify-content:center;padding:18px}
  .modal.show{display:flex}
  .sheet{width:440px;max-width:100%;max-height:88vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px}
  .sheet h3{margin:0 0 16px;font:700 18px 'Space Grotesk'}
  .sheet label{display:block;font:600 12px Inter;margin:0 0 6px}
  .sheet input,.sheet textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font:400 14px Inter;background:var(--bg);color:var(--fg);margin-bottom:13px}
  .sheet textarea{resize:vertical;min-height:62px}
  .sheet .save{width:100%;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:12px;font:600 14px Inter;cursor:pointer}
  .sheet .x{float:right;background:none;border:0;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  .err{color:#C0392B;font-size:13px;margin-top:6px;min-height:16px}
  .hint{color:var(--muted);font:400 11.5px/1.5 Inter;margin:-8px 0 13px}
</style>
</head>
<body>
<div class="glow"></div>
<div class="nav"><a href="/" class="logo">Enjeeoh</a><div class="links" id="nav-links"></div></div>
<div class="wrap">
  <div class="card">
    <div class="heart"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 3-3.3 3-5.5A4.5 4.5 0 0 0 12 5.5 4.5 4.5 0 0 0 2 8.5C2 12 6 15 12 20c2.4-2 4.4-3.6 5.8-5"/></svg></div>
    <h1 id="heading">Help keep Enjeeoh free</h1>
    <p class="blurb" id="blurb"></p>
    <p class="disclaimer" id="disclaimer"></p>
    <div id="form">
      <div class="toggle" id="toggle"></div>
      <div class="amounts" id="amounts"></div>
      <div class="custom"><span id="cur">$</span><input id="customAmt" type="number" min="1" placeholder="Other amount"></div>
      <a class="give" id="give" target="_blank" rel="noopener">Continue to secure checkout with Stripe</a>
      <div id="options" style="display:flex;flex-direction:column;gap:10px;margin-top:12px"></div>
      <div class="alts" id="alts"></div>
      <div class="safe">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <span>Payments are processed securely by Stripe. Enjeeoh never sees or stores your card details.</span>
      </div>
    </div>
    <div id="empty" class="none" style="display:none"></div>
  </div>
  <p class="oss">Enjeeoh is free for verified non-profits.</p>
</div>

<button class="editbtn" id="editBtn" style="display:none">Edit donation page</button>
<div class="modal" id="modal">
  <div class="sheet">
    <button class="x" id="close">x</button>
    <h3 id="sheetTitle">Donation settings</h3>
    <div id="loginBox">
      <label>Reviewer email</label><input id="se" type="email">
      <label>Password</label><input id="sp" type="password">
      <button class="save" id="loginBtn">Sign in</button>
      <div class="err" id="lerr"></div>
    </div>
    <div id="editBox" style="display:none">
      <label>Heading</label><input id="f_heading">
      <label>Blurb</label><textarea id="f_blurb"></textarea>
      <label>Disclaimer (tax / legal)</label><textarea id="f_disclaimer"></textarea>
      <label>Currency</label><input id="f_currency" placeholder="AUD">
      <label>Suggested amounts (comma separated)</label><input id="f_amounts" placeholder="10, 25, 50, 100">
      <label><input type="checkbox" id="f_recurring" style="width:auto;margin-right:6px;vertical-align:-1px">Offer a monthly option</label>
      <div style="height:8px"></div>
      <label>Stripe Payment Link</label><input id="f_stripe" placeholder="https://buy.stripe.com/...">
      <label>Open Collective URL</label><input id="f_oc" placeholder="https://opencollective.com/your-project">
      <label>GitHub Sponsors URL</label><input id="f_gh" placeholder="https://github.com/sponsors/you">
      <label>PayPal link</label><input id="f_pp" placeholder="https://paypal.me/you">
      <label>Ko-fi URL</label><input id="f_kofi" placeholder="https://ko-fi.com/you">
      <p class="hint">Set up at least one provider. Stripe is the simplest option for most.</p>
      <label>Extra payment options (each shows as its own button)</label>
      <div id="optList"></div>
      <button type="button" id="addOpt" style="background:var(--soft);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 14px;font:600 13px Inter;cursor:pointer;margin-bottom:12px">Add an option</button>
      <button class="save" id="saveBtn">Save donation settings</button>
      <div class="err" id="serr"></div>
    </div>
  </div>
</div>

<script>
var DEFAULTS={heading:'Support the project',blurb:'Enjeeoh is built and run by an independent sole trader, not a registered charity. Your support covers hosting and funds ongoing development so the platform can stay free for verified non-profits.',disclaimer:'Enjeeoh is operated by a sole trader and is not a registered charity. Contributions are not tax deductible. They go towards the running costs and continued development of this project.',currency:'AUD',amounts:[10,25,50,100],recurringEnabled:true,providers:{stripe:'',openCollective:'',githubSponsors:'',paypal:'',kofi:''}};
var SYM={AUD:'$',USD:'$',GBP:'£',EUR:'€',NGN:'₦'};
var cfg=DEFAULTS, selected=null, recurring=false, loggedIn=false;
var EDIT_MODE=new URLSearchParams(location.search).get('edit')==='1';
function getCsrf(){var m=document.cookie.match(/(?:^|; )csrf=([^;]+)/);return m?decodeURIComponent(m[1]):'';}

// match brand accent from landing if available
fetch('/api/landing').then(function(r){return r.json();}).then(function(l){
  if(l&&l.accent){document.documentElement.style.setProperty('--accent',l.accent);document.documentElement.style.setProperty('--accent2',l.accent2||l.accent);}
}).catch(function(){});

function load(){
  fetch('/api/donate').then(function(r){return r.json();}).then(function(d){cfg=d||DEFAULTS;render();}).catch(function(){cfg=DEFAULTS;render();});
}
function sym(){return SYM[cfg.currency]||'$';}
function priorityProvider(){var p=cfg.providers||{};return p.stripe?['stripe',p.stripe]:p.openCollective?['openCollective',p.openCollective]:p.paypal?['paypal',p.paypal]:p.kofi?['kofi',p.kofi]:p.githubSponsors?['githubSponsors',p.githubSponsors]:null;}
function buildUrl(name,url,amt){
  if(!amt) return url;
  if(name==='openCollective'){var b=url.replace(/\/$/,'');if(!/\/donate/.test(b))b+='/donate';return b+'?amount='+amt+(recurring?'&interval=month':'');}
  if(name==='paypal'&&/paypal\.me/i.test(url)){return url.replace(/\/$/,'')+'/'+amt;}
  return url; // stripe / kofi / github handle the amount on their page
}
function currentAmount(){var c=parseFloat(document.getElementById('customAmt').value);return c>0?c:selected;}
function refreshGive(){
  var pri=priorityProvider(), give=document.getElementById('give');
  if(!pri){give.style.display='none';return;}
  give.style.display='block';give.href=buildUrl(pri[0],pri[1],currentAmount());
}
function render(){
  document.getElementById('heading').textContent=cfg.heading||DEFAULTS.heading;
  document.getElementById('blurb').textContent=cfg.blurb||DEFAULTS.blurb;
  document.getElementById('disclaimer').textContent=cfg.disclaimer||DEFAULTS.disclaimer;
  document.getElementById('cur').textContent=sym();
  var pri=priorityProvider();
  document.getElementById('form').style.display=pri?'block':'none';
  document.getElementById('empty').style.display=pri?'none':'block';
  if(!pri){document.getElementById('empty').textContent=EDIT_MODE?'No payment link is set yet. Open Edit donation page and add one.':'Donations are not set up yet. Please check back soon.';}
  // toggle
  var tg=document.getElementById('toggle');tg.innerHTML='';
  if(cfg.recurringEnabled){
    [['One time',false],['Monthly',true]].forEach(function(o,i){var b=document.createElement('button');b.className=(i===0?'on':'');b.textContent=o[0];
      b.onclick=function(){recurring=o[1];tg.querySelectorAll('button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');refreshGive();};tg.appendChild(b);});
    tg.style.display='inline-flex';
  } else { tg.style.display='none'; }
  // amounts
  var am=document.getElementById('amounts');am.innerHTML='';selected=null;
  (cfg.amounts||DEFAULTS.amounts).slice(0,4).forEach(function(v,i){var b=document.createElement('button');b.className='amt'+(i===1?' on':'');b.textContent=sym()+v;
    if(i===1)selected=v;
    b.onclick=function(){selected=v;document.getElementById('customAmt').value='';am.querySelectorAll('.amt').forEach(function(x){x.classList.remove('on')});b.classList.add('on');refreshGive();};am.appendChild(b);});
  document.getElementById('customAmt').oninput=function(){am.querySelectorAll('.amt').forEach(function(x){x.classList.remove('on')});refreshGive();};
  // alternative providers
  var alts=document.getElementById('alts');alts.innerHTML='';var p=cfg.providers||{};
  var labels={openCollective:'Open Collective',githubSponsors:'GitHub Sponsors',kofi:'Ko-fi',paypal:'PayPal',stripe:'Card'};
  var primaryName=pri?pri[0]:null;
  ['openCollective','githubSponsors','paypal','kofi','stripe'].forEach(function(k){
    if(p[k]&&k!==primaryName){var a=document.createElement('a');a.className='alt';a.target='_blank';a.rel='noopener';a.href=buildUrl(k,p[k],currentAmount());a.textContent=labels[k];alts.appendChild(a);}
  });
  var optBox=document.getElementById('options'); optBox.innerHTML='';
  (cfg.options||[]).forEach(function(o){ var a=document.createElement('a'); a.className='give'; a.style.background='var(--card)'; a.style.color='var(--ink)'; a.style.border='1px solid var(--line)'; a.style.boxShadow='none'; a.target='_blank'; a.rel='noopener'; a.href=o.url; a.textContent=o.label; optBox.appendChild(a); });
  refreshGive();
  document.getElementById('editBtn').style.display=EDIT_MODE?'block':'none';
}

// reviewer edit — only available in console edit mode (?edit=1)
var modal=document.getElementById('modal');
document.getElementById('editBtn').onclick=function(){modal.classList.add('show');gateEdit();};
document.getElementById('close').onclick=function(){modal.classList.remove('show');};
function gateEdit(){
  fetch('/api/console/me',{credentials:'same-origin'}).then(function(r){loggedIn=r.ok;
    if(loggedIn){document.getElementById('loginBox').style.display='none';document.getElementById('editBox').style.display='block';fillForm();}
    else{document.getElementById('loginBox').style.display='block';document.getElementById('editBox').style.display='none';}
  }).catch(function(){document.getElementById('loginBox').style.display='block';document.getElementById('editBox').style.display='none';});
}
document.getElementById('loginBtn').onclick=function(){
  var err=document.getElementById('lerr');err.textContent='';
  fetch('/api/console/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({email:document.getElementById('se').value.trim(),password:document.getElementById('sp').value})})
   .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'Login failed');return d;});})
   .then(function(){loggedIn=true;gateEdit();render();})
   .catch(function(e){err.textContent=e.message;});
};
function fillForm(){
  document.getElementById('f_heading').value=cfg.heading||'';document.getElementById('f_blurb').value=cfg.blurb||'';document.getElementById('f_disclaimer').value=cfg.disclaimer||'';
  document.getElementById('f_currency').value=cfg.currency||'AUD';document.getElementById('f_amounts').value=(cfg.amounts||[]).join(', ');
  document.getElementById('f_recurring').checked=!!cfg.recurringEnabled;var p=cfg.providers||{};
  document.getElementById('f_stripe').value=p.stripe||'';document.getElementById('f_oc').value=p.openCollective||'';
  document.getElementById('f_gh').value=p.githubSponsors||'';document.getElementById('f_pp').value=p.paypal||'';document.getElementById('f_kofi').value=p.kofi||'';var ol=document.getElementById('optList');ol.innerHTML='';(cfg.options||[]).forEach(function(o){ol.appendChild(optRow(o.label,o.url));});
}
function optRow(label,url){var d=document.createElement('div');d.className='opt-row';d.style.cssText='display:flex;gap:8px;margin-bottom:8px';d.innerHTML='<input class="o-label" placeholder="Label e.g. Donate $25" value="'+(label||'').replace(/"/g,'&quot;')+'" style="flex:1"><input class="o-url" placeholder="https://buy.stripe.com/..." value="'+(url||'').replace(/"/g,'&quot;')+'" style="flex:2"><button type="button" class="o-del" style="border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer">x</button>';d.querySelector('.o-del').onclick=function(){d.remove();};return d;}
document.getElementById('addOpt').onclick=function(){document.getElementById('optList').appendChild(optRow('',''));};
document.getElementById('saveBtn').onclick=function(){
  var err=document.getElementById('serr');err.textContent='';
  var body={heading:document.getElementById('f_heading').value.trim(),blurb:document.getElementById('f_blurb').value.trim(),disclaimer:document.getElementById('f_disclaimer').value.trim(),
    currency:document.getElementById('f_currency').value.trim()||'AUD',
    amounts:document.getElementById('f_amounts').value.split(',').map(function(s){return parseFloat(s.trim());}).filter(function(n){return n>0;}).slice(0,4),
    recurringEnabled:document.getElementById('f_recurring').checked,
    providers:{stripe:document.getElementById('f_stripe').value.trim(),openCollective:document.getElementById('f_oc').value.trim(),
      githubSponsors:document.getElementById('f_gh').value.trim(),paypal:document.getElementById('f_pp').value.trim(),kofi:document.getElementById('f_kofi').value.trim()},
    options:Array.prototype.map.call(document.querySelectorAll('#optList .opt-row'),function(r){return {label:r.querySelector('.o-label').value.trim(),url:r.querySelector('.o-url').value.trim()};}).filter(function(o){return o.label&&o.url;})};
  fetch('/api/donate',{method:'PUT',headers:{'Content-Type':'application/json','X-CSRF-Token':getCsrf()},credentials:'same-origin',body:JSON.stringify(body)})
   .then(function(r){if(!r.ok)throw new Error('Save failed, please sign in again');return r.json();})
   .then(function(d){cfg=d.donate;render();modal.classList.remove('show');})
   .catch(function(e){err.textContent=e.message;});
};
load();
</script>
<script src="/nav.js"></script>
</body>
</html>
