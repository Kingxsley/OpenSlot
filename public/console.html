<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Super admin console, Enjeeoh</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#0F9D7A;--ink:#15162A;--muted:#6B7280;--line:#ECEDF4;--bg:#FBFBFE;--soft:#F4F4FA;--card:#FFF}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
  .wrap{max-width:1040px;margin:0 auto;padding:24px 18px 70px}
  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  h1{font:700 24px 'Space Grotesk';margin:0}
  .role{font:600 11px Inter;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);border-radius:20px;padding:5px 11px;margin-left:8px;vertical-align:2px}
  .ghost{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font:600 13px Inter;cursor:pointer;color:var(--ink)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0}
  .tab{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:9px 15px;font:600 13px Inter;cursor:pointer;color:var(--muted)}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .badge{font:600 11px Inter;text-transform:uppercase;letter-spacing:.05em;border-radius:20px;padding:4px 10px}
  .b-pending{background:#FEF3C7;color:#92400E}.b-approved{background:#D1FAE5;color:#065F46}.b-rejected{background:#FEE2E2;color:#991B1B}
  .b-locked{background:#FEE2E2;color:#991B1B}.b-active{background:#D1FAE5;color:#065F46}.b-invited{background:#E0E7FF;color:#3730A3}
  .meta{color:var(--muted);font-size:13px;margin:4px 0 0}
  .acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
  button.go{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:8px 14px;font:600 13px Inter;cursor:pointer}
  button.no{background:#fff;color:#991B1B;border:1px solid #FCA5A5;border-radius:9px;padding:8px 14px;font:600 13px Inter;cursor:pointer}
  input,select,textarea{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font:400 14px Inter;background:var(--bg);color:var(--ink)}
  textarea{width:100%;font-family:ui-monospace,monospace;font-size:13px;line-height:1.5}
  input.note{flex:1;min-width:160px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .toolbar input[type=search]{min-width:180px;flex:1}
  .toolbar .grow{flex:1}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font:600 11px Inter;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--ink)}
  th .arrow{opacity:.5;font-size:10px}
  .mono{font:12px ui-monospace,monospace;color:var(--muted)}
  .login{max-width:380px;margin:80px auto}
  .login .card{padding:24px} .login label{display:block;font:600 13px Inter;margin:0 0 6px}
  .login input{width:100%;margin-bottom:12px} .login button{width:100%;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:12px;font:600 14px Inter;cursor:pointer}
  .err{color:#C0392B;font-size:13px;min-height:16px;margin-top:8px} .hide{display:none}
  .lim{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .lim input{width:90px}
  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
  .modal-ov{position:fixed;inset:0;background:rgba(10,12,22,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px}
  .modal-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(10,12,40,.3)}
  .modal-card h3{margin:0 0 8px;font:700 18px 'Space Grotesk'}
  .modal-card p{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.55}
  .modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font:600 13px Inter;z-index:300;opacity:0;transition:opacity .2s,transform .2s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:#B0322B}.toast.ok{background:var(--accent)}
  .field{margin:10px 0}.field label{display:block;font:600 13px Inter;margin:0 0 4px}
  details.acc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
  details.acc>summary{list-style:none;cursor:pointer;padding:13px 16px;font:600 14px Inter;display:flex;align-items:center;gap:8px;user-select:none}
  details.acc>summary::-webkit-details-marker{display:none}
  details.acc>summary::before{content:'▸';color:var(--muted);font-size:12px;transition:transform .15s}
  details.acc[open]>summary::before{transform:rotate(90deg)}
  details.acc[open]>summary{border-bottom:1px solid var(--line)}
  details.acc .acc-body{padding:14px 16px}
  .wysiwyg{border:1px solid var(--line);border-radius:9px;padding:11px;min-height:120px;background:var(--card);font:400 14px Inter;line-height:1.55}
  .wysiwyg:focus{outline:2px solid color-mix(in srgb,var(--accent) 40%,transparent);outline-offset:1px}
  .wysiwyg p{margin:0 0 8px} .wysiwyg h3{margin:0 0 6px;font:600 16px 'Space Grotesk'} .wysiwyg a{color:var(--accent)}
  @media (max-width:620px){ .row{flex-direction:column} table{font-size:12px} }
</style>
</head>
<body>
<div id="loginView" class="login hide">
  <h1>Super admin console</h1>
  <div class="card" style="margin-top:14px">
    <label>Email</label><input id="le" type="email">
    <label>Password</label><input id="lp" type="password">
    <button id="lbtn">Sign in</button>
    <div class="err" id="lerr"></div>
  </div>
</div>

<div id="appView" class="wrap hide">
  <div class="top">
    <h1>Super admin console <span class="role" id="roleBadge"></span></h1>
    <button class="ghost" id="logout">Log out</button>
  </div>
  <div class="tabs">
    <button class="tab" data-t="apps" data-roles="superadmin,onboarding">Applications</button>
    <button class="tab" data-t="members" data-roles="superadmin">Members</button>
    <button class="tab" data-t="logs" data-roles="superadmin,onboarding,content">Activity log</button>
    <button class="tab" data-t="design" data-roles="superadmin,content">Design</button>
    <button class="tab" data-t="admins" data-roles="superadmin">Admins</button>
    <button class="tab" data-t="limits" data-roles="superadmin">Organisations</button>
    <button class="tab" data-t="emails" data-roles="superadmin">Emails</button>
    <button class="tab" data-t="security" data-roles="superadmin">Security</button>
  </div>
  <div id="apps" class="hide"></div>
  <div id="members" class="hide"></div>
  <div id="logs" class="hide"></div>
  <div id="design" class="hide"></div>
  <div id="admins" class="hide"></div>
  <div id="limits" class="hide"></div>
  <div id="emails" class="hide"></div>
  <div id="security" class="hide"></div>
</div>

<script>
var role='';
// Session lives in an httpOnly cookie (sent automatically); JS only handles the
// readable CSRF token, echoed back in a header on every request.
function getCsrf(){var m=document.cookie.match(/(?:^|; )csrf=([^;]+)/);return m?decodeURIComponent(m[1]):'';}
function H(){return {'Content-Type':'application/json','X-CSRF-Token':getCsrf()};}
function esc(s){var d=document.createElement('div');d.textContent=(s==null?'':s);return d.innerHTML;}
function attr(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// In-app confirm dialog (replaces the browser's native confirm). Returns a Promise<boolean>.
function appConfirm(opts){
  opts=opts||{};
  return new Promise(function(resolve){
    var ov=document.createElement('div'); ov.className='modal-ov';
    ov.innerHTML='<div class="modal-card" role="dialog" aria-modal="true">'+
      '<h3>'+esc(opts.title||'Please confirm')+'</h3>'+
      '<p>'+esc(opts.message||'Are you sure?')+'</p>'+
      '<div class="modal-acts"><button class="ghost" data-act="cancel">'+esc(opts.cancelText||'Cancel')+'</button>'+
      '<button class="'+(opts.danger?'no':'go')+'" data-act="ok">'+esc(opts.confirmText||'Confirm')+'</button></div></div>';
    function close(val){ document.removeEventListener('keydown',onKey); ov.remove(); resolve(val); }
    function onKey(e){ if(e.key==='Escape') close(false); if(e.key==='Enter') close(true); }
    ov.addEventListener('click',function(e){ if(e.target===ov) close(false); });
    ov.querySelector('[data-act=cancel]').onclick=function(){ close(false); };
    ov.querySelector('[data-act=ok]').onclick=function(){ close(true); };
    document.addEventListener('keydown',onKey);
    document.body.appendChild(ov);
    ov.querySelector('[data-act=ok]').focus();
  });
}
// In-app toast (replaces alert for brief notices).
function appToast(message,type){
  var t=document.createElement('div'); t.className='toast'+(type?' '+type:''); t.textContent=message;
  document.body.appendChild(t); requestAnimationFrame(function(){ t.classList.add('show'); });
  setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); },250); }, type==='err'?4200:2600);
}

// ---- shared filter / sort / export helpers ----
function textIncludes(obj, fields, q){ if(!q) return true; q=q.toLowerCase(); return fields.some(function(f){return String(obj[f]==null?'':obj[f]).toLowerCase().indexOf(q)>=0;}); }
function sortRows(rows, key, dir){ return rows.slice().sort(function(a,b){ var x=a[key], y=b[key];
  if(typeof x==='number'&&typeof y==='number'){ return dir==='asc'?x-y:y-x; }
  x=String(x==null?'':x).toLowerCase(); y=String(y==null?'':y).toLowerCase();
  return dir==='asc'?x.localeCompare(y):y.localeCompare(x); }); }
function downloadCSV(filename, headers, rows){
  var q=function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"';};
  var lines=[headers.map(q).join(',')].concat(rows.map(function(r){return r.map(q).join(',');}));
  var blob=new Blob([lines.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();a.remove();
}
function sortableTh(label, key, state){
  var on=state.sort===key; var arrow=on?(state.dir==='asc'?'▲':'▼'):'';
  return '<th class="sortable" data-sort="'+key+'">'+esc(label)+' <span class="arrow">'+arrow+'</span></th>';
}
function wireSort(scope, state, rerender){
  scope.querySelectorAll('th.sortable').forEach(function(th){ th.onclick=function(){ var k=th.dataset.sort;
    if(state.sort===k){ state.dir=state.dir==='asc'?'desc':'asc'; } else { state.sort=k; state.dir='asc'; } rerender(); }; });
}

function showLogin(){document.getElementById('loginView').classList.remove('hide');document.getElementById('appView').classList.add('hide');}
function showApp(){document.getElementById('loginView').classList.add('hide');document.getElementById('appView').classList.remove('hide');
  document.getElementById('roleBadge').textContent = {superadmin:'Super admin',onboarding:'Onboarding',content:'Content manager'}[role] || 'Platform admin';
  var tabs=document.querySelectorAll('.tab'), first=null;
  tabs.forEach(function(t){ var allowed=(t.dataset.roles||'').split(',').indexOf(role)>=0; t.classList.toggle('hide', !allowed); if(allowed && !first) first=t; });
  if(first){ openTab(first); }
}
function openTab(t){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});t.classList.add('on');
  ['apps','members','logs','design','admins','limits','emails','security'].forEach(function(id){document.getElementById(id).classList.add('hide');});
  var sel=t.dataset.t;document.getElementById(sel).classList.remove('hide');
  ({apps:loadApps,members:loadMembers,logs:loadLogs,design:loadDesign,admins:loadAdmins,limits:loadLimits,emails:loadEmails,security:loadSecurity}[sel]||function(){})();
}

document.getElementById('lbtn').onclick=function(){
  var err=document.getElementById('lerr');err.textContent='';
  fetch('/api/console/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('le').value.trim(),password:document.getElementById('lp').value})})
   .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'Login failed');return d;});})
   .then(function(d){role=d.role;showApp();})
   .catch(function(e){err.textContent=e.message;});
};
document.getElementById('logout').onclick=function(){fetch('/api/console/logout',{method:'POST',headers:{'X-CSRF-Token':getCsrf()},credentials:'same-origin'}).catch(function(){}).then(function(){role='';showLogin();});};
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){ openTab(t); };});

// ================= APPLICATIONS (pending / approved / rejected tabs) =================
var appsState={raw:[],tab:'pending',q:'',page:1,pageSize:20,sort:'createdAt',dir:'desc'};
function loadApps(){
  fetch('/api/console/applications',{headers:H()}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(list){
    appsState.raw=list; renderApps();
  }).catch(function(){showLogin();});
}
function appsCount(status){ return appsState.raw.filter(function(a){return a.status===status;}).length; }
function appsFiltered(){
  var rows=appsState.raw.filter(function(a){return a.status===appsState.tab && textIncludes(a,['name','email','country','contactName','website','mission','slug'],appsState.q);});
  return sortRows(rows, appsState.sort, appsState.dir);
}
function renderApps(){
  var el=document.getElementById('apps');
  var subtabs='<div class="tabs" style="margin:0 0 12px">'+['pending','approved','rejected'].map(function(s){
    return '<button class="tab'+(appsState.tab===s?' on':'')+'" data-apptab="'+s+'">'+s.charAt(0).toUpperCase()+s.slice(1)+' <span class="badge b-'+s+'" style="padding:2px 7px">'+appsCount(s)+'</span></button>';
  }).join('')+'</div>';
  var toolbar='<div class="card">'+subtabs+'<div class="toolbar">'+
    '<input type="search" id="apps-q" placeholder="Search name, email, country..." value="'+attr(appsState.q)+'">'+
    '<select id="apps-sort">'+[['createdAt','Newest'],['name','Name'],['memberCount','Members'],['country','Country']].map(function(o){return '<option value="'+o[0]+'"'+(appsState.sort===o[0]?' selected':'')+'>Sort: '+o[1]+'</option>';}).join('')+'</select>'+
    '<button class="ghost" id="apps-dir">'+(appsState.dir==='asc'?'Asc ▲':'Desc ▼')+'</button>'+
    '<select id="apps-size"><option value="20"'+(appsState.pageSize===20?' selected':'')+'>20 / page</option><option value="50"'+(appsState.pageSize===50?' selected':'')+'>50 / page</option></select>'+
    '<button class="ghost" id="apps-export">Export CSV</button>'+
    '</div><div class="meta" id="apps-count"></div></div>';
  var rows=appsFiltered();
  var pages=Math.max(1,Math.ceil(rows.length/appsState.pageSize));
  if(appsState.page>pages) appsState.page=pages;
  var pageRows=rows.slice((appsState.page-1)*appsState.pageSize, appsState.page*appsState.pageSize);
  var isSuper=role==='superadmin';
  var body=!rows.length?'<div class="card">No '+appsState.tab+' applications'+(appsState.q?' match your search.':'.')+'</div>':pageRows.map(function(a){
    var cap = a.maxMembers>0 ? a.maxMembers : 'no limit';
    var actions='';
    if(a.status==='pending') actions='<button class="go" onclick="decide(\''+a.id+'\',\'approved\')">Approve</button><button class="no" onclick="decide(\''+a.id+'\',\'rejected\')">Reject</button>';
    else if(a.status==='approved') actions='<button class="no" onclick="decide(\''+a.id+'\',\'rejected\')">Revoke approval</button>';
    else actions='<button class="go" onclick="decide(\''+a.id+'\',\'approved\')">Approve</button>';
    return '<div class="card"><div class="row"><div><b>'+esc(a.name)+'</b> <span class="badge b-'+a.status+'">'+a.status+'</span>'+
      (a.suspended?' <span class="badge b-locked">suspended</span>':'')+
      '<div class="meta">'+esc(a.email)+(a.country?' · '+esc(a.country):'')+' · '+a.memberCount+' members ('+cap+') · applied '+esc(new Date(a.createdAt).toLocaleDateString())+'</div>'+
      (a.mission?'<div class="meta">'+esc(a.mission)+'</div>':'')+(a.website?'<div class="meta mono">'+esc(a.website)+'</div>':'')+
      (a.reviewNote?'<div class="meta">Note: '+esc(a.reviewNote)+'</div>':'')+'</div></div>'+
      '<div class="acts"><input class="note" id="note-'+a.id+'" placeholder="Note (optional)">'+actions+'</div>'+
      (isSuper?'<div class="lim">Max members for this org: <input type="number" min="0" id="cap-'+a.id+'" value="'+(a.maxMembers||0)+'"> <button class="ghost" onclick="setOrgCap(\''+a.id+'\')">Save</button> <span class="meta">(0 = no limit)</span></div>':'')+
      '</div>';
  }).join('');
  var pager=rows.length>appsState.pageSize?'<div class="pager"><span class="meta">'+rows.length+' '+appsState.tab+' · page '+appsState.page+' of '+pages+'</span><button class="ghost" id="apps-prev"'+(appsState.page<=1?' disabled':'')+'>Prev</button><button class="ghost" id="apps-next"'+(appsState.page>=pages?' disabled':'')+'>Next</button></div>':'';
  el.innerHTML=toolbar+body+pager;
  document.getElementById('apps-count').textContent=rows.length+' '+appsState.tab+(appsState.q?' matching':'')+' application'+(rows.length===1?'':'s');
  el.querySelectorAll('[data-apptab]').forEach(function(b){b.onclick=function(){appsState.tab=b.dataset.apptab;appsState.page=1;renderApps();};});
  document.getElementById('apps-q').oninput=function(){appsState.q=this.value;appsState.page=1;renderApps();var i=document.getElementById('apps-q');i.focus();i.setSelectionRange(i.value.length,i.value.length);};
  document.getElementById('apps-sort').onchange=function(){appsState.sort=this.value;renderApps();};
  document.getElementById('apps-dir').onclick=function(){appsState.dir=appsState.dir==='asc'?'desc':'asc';renderApps();};
  document.getElementById('apps-size').onchange=function(){appsState.pageSize=Number(this.value);appsState.page=1;renderApps();};
  if(document.getElementById('apps-prev')) document.getElementById('apps-prev').onclick=function(){if(appsState.page>1){appsState.page--;renderApps();}};
  if(document.getElementById('apps-next')) document.getElementById('apps-next').onclick=function(){if(appsState.page<pages){appsState.page++;renderApps();}};
  document.getElementById('apps-export').onclick=function(){
    downloadCSV('enjeeoh-'+appsState.tab+'-applications-'+new Date().toISOString().slice(0,10)+'.csv',
      ['name','email','status','country','contact','website','members','max_members','suspended','applied'],
      appsFiltered().map(function(a){return [a.name,a.email,a.status,a.country,a.contactName,a.website,a.memberCount,a.maxMembers||0,a.suspended?'yes':'no',a.createdAt];}));
  };
}
window.decide=function(id,decision){
  var note=document.getElementById('note-'+id).value;
  fetch('/api/console/'+id+'/decision',{method:'POST',headers:H(),body:JSON.stringify({decision:decision,note:note})}).then(loadApps);
};
window.setOrgCap=function(id){
  var v=document.getElementById('cap-'+id).value;
  fetch('/api/console/org/'+id+'/limit',{method:'PUT',headers:H(),body:JSON.stringify({maxMembers:v})}).then(loadApps);
};

// ================= MEMBERS (all orgs) =================
var memState={raw:[],q:'',role:'',status:'',locked:'',sort:'orgName',dir:'asc'};
function loadMembers(){
  fetch('/api/console/members',{headers:H()}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(list){ memState.raw=list; renderMembers(); }).catch(function(){showLogin();});
}
function memFiltered(){
  var rows=memState.raw.filter(function(m){
    if(memState.role&&m.role!==memState.role)return false;
    if(memState.status&&m.status!==memState.status)return false;
    if(memState.locked==='locked'&&!m.locked)return false;
    if(memState.locked==='reset'&&!m.forceReset)return false;
    return textIncludes(m,['name','email','orgName','role'],memState.q);
  });
  return sortRows(rows,memState.sort,memState.dir);
}
function renderMembers(){
  var rows=memFiltered();
  var toolbar='<div class="toolbar">'+
    '<input type="search" id="mem-q" placeholder="Search member, email, org..." value="'+attr(memState.q)+'">'+
    '<select id="mem-role"><option value="">All roles</option>'+['admin','manager','member'].map(function(r){return '<option value="'+r+'"'+(memState.role===r?' selected':'')+'>'+r+'</option>';}).join('')+'</select>'+
    '<select id="mem-status"><option value="">All states</option>'+['active','invited','suspended'].map(function(s){return '<option value="'+s+'"'+(memState.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select>'+
    '<select id="mem-locked"><option value="">Any</option><option value="locked"'+(memState.locked==='locked'?' selected':'')+'>Locked only</option><option value="reset"'+(memState.locked==='reset'?' selected':'')+'>Reset pending</option></select>'+
    '<button class="ghost" id="mem-export">Export CSV</button></div>';
  var head='<thead><tr>'+sortableTh('Name','name',memState)+sortableTh('Email','email',memState)+sortableTh('Organisation','orgName',memState)+sortableTh('Role','role',memState)+sortableTh('State','status',memState)+sortableTh('Pwd age','passwordAgeDays',memState)+'<th>Actions</th></tr></thead>';
  var trs=rows.map(function(m){
    var state=m.suspended?'<span class="badge b-locked">suspended</span>':(m.locked?'<span class="badge b-locked">locked</span>':'<span class="badge b-'+(m.status==='active'?'active':'invited')+'">'+m.status+'</span>');
    var age=m.passwordAgeDays==null?'—':(m.passwordAgeDays+'d');
    var acts='<button class="ghost" onclick="memForceReset(\''+m.id+'\')">Force reset</button>';
    if(m.locked) acts+='<button class="go" onclick="memUnlock(\''+m.id+'\')">Unlock</button>';

var logState={items:[],total:0,page:1,pageSize:50,q:'',sort:'ts',dir:'desc'};
function logsUrl(p){ return '/api/console/logs?paginate=1&page='+(p||logState.page)+'&pageSize='+logState.pageSize+'&q='+encodeURIComponent(logState.q)+'&sort='+logState.sort+'&dir='+logState.dir; }
function loadLogs(){
  fetch(logsUrl(),{headers:H()}).then(function(r){return r.json();}).then(function(d){ logState.items=d.items||[]; logState.total=d.total||0; renderLogs(); });
}
function renderLogs(){
  var toolbar='<div class="toolbar">'+
    '<input type="search" id="log-q" placeholder="Search action, actor, org, IP..." value="'+attr(logState.q)+'">'+
    '<select id="log-size"><option value="50"'+(logState.pageSize===50?' selected':'')+'>50 per page</option><option value="100"'+(logState.pageSize===100?' selected':'')+'>100 per page</option></select>'+
    '<button class="ghost" id="log-export">Export CSV</button></div>';
  var head='<thead><tr>'+sortableTh('When','ts',logState)+sortableTh('Action','action',logState)+sortableTh('Actor','actor',logState)+sortableTh('Organisation','accountName',logState)+'<th>Detail</th><th>IP</th></tr></thead>';
  var trs=logState.items.map(function(l){return '<tr><td class="mono">'+esc(new Date(l.ts).toLocaleString())+'</td><td>'+esc(l.action)+'</td><td>'+esc(l.actor)+'<div class="meta">'+esc(l.actorRole||'')+'</div></td><td>'+esc(l.accountName||'')+'</td><td>'+esc(l.detail||'')+'</td><td class="mono">'+esc(l.ip||'')+'</td></tr>';}).join('');
  var pages=Math.max(1,Math.ceil(logState.total/logState.pageSize));
  var pager='<div class="pager"><span class="meta">'+logState.total+' events · page '+logState.page+' of '+pages+'</span>'+
    '<button class="ghost" id="log-prev"'+(logState.page<=1?' disabled':'')+'>Prev</button>'+
    '<button class="ghost" id="log-next"'+(logState.page>=pages?' disabled':'')+'>Next</button></div>';
  document.getElementById('logs').innerHTML='<div class="card"><div class="row" style="margin-bottom:10px"><h3 style="margin:0;font:600 16px Space Grotesk">Activity log</h3></div>'+toolbar+'<div style="overflow-x:auto"><table>'+head+'<tbody>'+(trs||'<tr><td colspan="6">No activity.</td></tr>')+'</tbody></table></div>'+pager+'</div>';
  var scope=document.getElementById('logs');
  var qi=document.getElementById('log-q');
  qi.oninput=function(){ logState.q=this.value; logState.page=1; clearTimeout(window._logT); window._logT=setTimeout(function(){loadLogs();},250); };
  document.getElementById('log-size').onchange=function(){ logState.pageSize=Number(this.value); logState.page=1; loadLogs(); };
  document.getElementById('log-prev').onclick=function(){ if(logState.page>1){logState.page--;loadLogs();} };
  document.getElementById('log-next').onclick=function(){ if(logState.page<pages){logState.page++;loadLogs();} };
  document.getElementById('log-export').onclick=exportLogsAll;
  wireSort(scope,logState,function(){ logState.page=1; loadLogs(); });
}
function exportLogsAll(){
  var all=[],page=1,total=Infinity;
  function next(){
    fetch('/api/console/logs?paginate=1&page='+page+'&pageSize=100&q='+encodeURIComponent(logState.q)+'&sort='+logState.sort+'&dir='+logState.dir,{headers:H()})
      .then(function(r){return r.json();}).then(function(d){ all=all.concat(d.items||[]); total=d.total||0; page++;
        if(all.length<total && (d.items||[]).length>0){ next(); }
        else { downloadCSV('enjeeoh-activity-log-'+new Date().toISOString().slice(0,10)+'.csv',
          ['time','action','actor','actor_role','organisation','detail','ip'],
          all.map(function(l){return [new Date(l.ts).toISOString(),l.action,l.actor,l.actorRole||'',l.accountName||'',l.detail||'',l.ip||''];})); }
      });
  }
  next();
}

function loadLimits(){
  Promise.all([
    fetch('/api/console/limits',{headers:H()}).then(function(r){return r.json();}),

  ]).then(function(res){ orgState.limits=res[0]; orgState.raw=res[1]; renderLimits(); });

function orgBucket(a){ return a.deleted?'deleted':(a.suspended?'locked':'active'); }

        '<button class="ghost" onclick="orgForceReset(\''+a.id+'\',\''+attr(a.name)+'\')">Force reset all</button>'+
        '<button class="no" onclick="orgSoftDelete(\''+a.id+'\',\''+attr(a.name)+'\')">Delete</button>'+
        '<button class="ghost" onclick="toggleMembers(\''+a.id+'\')">Members</button>';
    } else if(tab==='locked'){

        '<button class="no" onclick="orgPurge(\''+a.id+'\',\''+attr(a.name)+'\')">Delete permanently</button>';

      '<div class="lim" style="margin-top:8px">'+acts+'</div><div id="mem-'+a.id+'" class="hide" style="margin-top:8px"></div></div>';
  }).join('');
  var blurb=tab==='locked'?'<p class="meta" style="margin:0 0 8px">Locked organisations cannot sign in or take bookings. Unlock to restore full access.</p>':(tab==='deleted'?'<p class="meta" style="margin:0 0 8px">Deleted organisations are hidden and have no access, but their data is kept. Reactivate to restore, or delete permanently to erase it forever.</p>':'');

  document.getElementById('org-dir').onclick=function(){orgState.dir=orgState.dir==='asc'?'desc':'asc';renderLimits();};
  document.getElementById('org-export').onclick=function(){ downloadCSV('enjeeoh-organisations-'+tab+'-'+new Date().toISOString().slice(0,10)+'.csv',['name','email','status','members','max_members','state','created'],orgsFiltered().map(function(a){return [a.name,a.email,a.status,a.memberCount,a.maxMembers||0,orgBucket(a),a.createdAt];})); };

window.orgPurge=function(id,name){ appConfirm({title:'Delete permanently',message:'Permanently erase "'+name+'" and all its members, bookings and data? This cannot be undone.',confirmText:'Delete forever',danger:true}).then(function(ok){ if(!ok)return; appConfirm({title:'Are you absolutely sure?',message:'This is irreversible. Everything belonging to "'+name+'" will be erased.',confirmText:'Yes, erase it',danger:true}).then(function(ok2){ if(ok2) fetch('/api/console/org/'+id,{method:'DELETE',headers:H()}).then(loadLimits); }); }); };
window.orgForceReset=function(id,name){ appConfirm({title:'Force reset all members',message:'Force every active member of "'+name+'" to set a new password before signing in again? Each is emailed a reset link.',confirmText:'Force reset all',danger:true}).then(function(ok){ if(!ok)return; fetch('/api/console/org/'+id+'/force-reset',{method:'POST',headers:H()}).then(function(r){return r.json();}).then(function(d){ appToast('Reset required for '+(d.count||0)+' members.','ok'); }); }); };
window.toggleMembers=function(id){
  var box=document.getElementById('mem-'+id); if(!box.classList.contains('hide')){box.classList.add('hide');return;}
  box.classList.remove('hide');
  fetch('/api/console/org/'+id+'/members',{headers:H()}).then(function(r){return r.json();}).then(function(ms){
    box.innerHTML=ms.map(function(m){
      var tags=(m.suspended?' <span class="badge b-rejected">suspended</span>':'')+(m.locked?' <span class="badge b-locked">locked</span>':'')+(m.forceReset?' <span class="badge b-pending">reset</span>':'');
      var acts=(m.locked&&m.role!=='admin'?'<button class="go" onclick="memUnlock2(\''+m.id+'\',\''+id+'\')">Unlock</button>':'')+
        '<button class="ghost" onclick="memReset2(\''+m.id+'\',\''+id+'\')">Force reset</button>'+
        (m.suspended?'<button class="go" onclick="memAccess(\''+m.id+'\',\'restore\',\''+id+'\')">Restore</button>':'<button class="no" onclick="memAccess(\''+m.id+'\',\'suspend\',\''+id+'\')">Revoke</button>');
      return '<div class="row" style="padding:6px 0;border-top:1px solid var(--line)"><div>'+esc(m.name)+' <span class="meta">'+esc(m.email)+' · '+m.role+'</span>'+tags+'</div><div class="acts" style="margin:0">'+acts+'</div></div>';
    }).join('')||'<p class="meta">No members.</p>';
    // bulk add
    box.innerHTML+='<div style="border-top:1px dashed var(--line);margin-top:10px;padding-top:10px">'+
      '<div style="font-weight:600;font-size:13px;margin-bottom:4px">Bulk add members</div>'+
      '<p class="meta" style="margin:0 0 6px">One per line. Formats: <code>email</code> · <code>Name, email</code> · <code>Name, email, role</code> (role = member/manager/admin). Each person is emailed a link to set their password.</p>'+
      '<textarea id="bulk-'+id+'" rows="4" placeholder="Jane Doe, jane@org.org, manager\njohn@org.org" style="width:100%"></textarea>'+
      '<div class="lim"><button class="go" onclick="bulkAdd(\''+id+'\')">Add members &amp; email them</button></div>'+
      '<div class="meta" id="bulkres-'+id+'" style="margin-top:6px;white-space:pre-wrap"></div></div>';
  });
};
function parseBulk(text){
  return text.split(/\n/).map(function(l){return l.trim();}).filter(Boolean).map(function(line){
    var parts=line.split(',').map(function(p){return p.trim();});
    var email=(parts.find(function(p){return p.indexOf('@')>=0;})||'').toLowerCase();
    var role=(parts.find(function(p){return ['admin','manager','member'].indexOf(p.toLowerCase())>=0;})||'member').toLowerCase();
    var name=parts.find(function(p){return p && p.indexOf('@')<0 && ['admin','manager','member'].indexOf(p.toLowerCase())<0;})||'';
    return {email:email,name:name,role:role};
  }).filter(function(r){return r.email;});
}
window.bulkAdd=function(id){
  var members=parseBulk(document.getElementById('bulk-'+id).value);
  var res=document.getElementById('bulkres-'+id);
  if(!members.length){ res.style.color='#C0392B'; res.textContent='Add at least one valid email.'; return; }
  res.style.color='var(--muted)'; res.textContent='Adding '+members.length+'…';
  fetch('/api/console/org/'+id+'/members/bulk',{method:'POST',headers:H(),body:JSON.stringify({members:members})})
    .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error);return d;});})
    .then(function(d){
      res.style.color='var(--accent)';
      var msg='Added '+d.added+(d.emailed?' (emails sent)':' (email is OFF — no emails sent)')+'.';
      if(d.skipped&&d.skipped.length) msg+='\nSkipped: '+d.skipped.join('; ');
      if(d.errors&&d.errors.length){ res.style.color='#C0392B'; msg+='\nErrors: '+d.errors.join('; '); }
      msg+='\nReopen the Members list to see them.'; res.textContent=msg;
      document.getElementById('bulk-'+id).value='';
    }).catch(function(e){ res.style.color='#C0392B'; res.textContent=e.message; });
};
function reopenMembers(oid){ document.getElementById('mem-'+oid).classList.add('hide'); toggleMembers(oid); }
window.memAccess=function(mid,action,oid){ fetch('/api/console/member/'+mid+'/'+action,{method:'POST',headers:H()}).then(function(){ reopenMembers(oid); }); };

// ================= EMAIL TEMPLATES (visual editor only) =================
// The body is edited in a WYSIWYG contenteditable surface — there is no raw-HTML
// field. A toolbar drives document.execCommand for formatting, and placeholder
// chips insert {{tokens}} at the cursor. We save the editor's innerHTML.
function tbtn(label, cmd, k){ return '<button type="button" class="ghost" style="padding:5px 9px" onmousedown="return etCmd(event,\''+cmd+'\',\''+k+'\')">'+label+'</button>'; }
function loadEmails(){
  fetch('/api/console/email-templates',{headers:H()}).then(function(r){return r.json();}).then(function(t){
    var keys=Object.keys(t);
    var cards=keys.map(function(k){var d=t[k];
      var vars=d.vars.map(function(v){return '<button type="button" class="ghost" style="padding:5px 9px;font-family:ui-monospace,monospace" onmousedown="return etInsert(event,\''+k+'\',\''+v+'\')">{{'+v+'}}</button>';}).join(' ');
      return '<details class="acc"><summary>'+esc(d.label)+(d.customised?' <span class="badge b-pending">customised</span>':'')+'</summary><div class="acc-body">'+
        '<div class="field"><label>Subject</label><input style="width:100%" id="et-sub-'+k+'" value="'+attr(d.subject)+'"></div>'+
        '<div class="field"><label>Message</label>'+
          '<div class="toolbar" style="margin:0 0 6px;gap:4px">'+tbtn('<b>B</b>','bold',k)+tbtn('<i>I</i>','italic',k)+tbtn('<u>U</u>','underline',k)+tbtn('Heading','formatBlock:h3',k)+tbtn('• List','insertUnorderedList',k)+tbtn('Link','createLink',k)+tbtn('🖼 Image','image',k)+tbtn('Clear','removeFormat',k)+'</div>'+
          '<div id="et-html-'+k+'" contenteditable="true" class="wysiwyg">'+d.html+'</div>'+
          '<div class="meta" style="margin-top:6px">Insert placeholder: '+vars+'</div>'+
        '</div>'+
        '<div class="lim"><button class="go" onclick="saveTpl(\''+k+'\')">Save</button><button class="ghost" onclick="etPreview(\''+k+'\')">Preview</button><button class="ghost" onclick="resetTpl(\''+k+'\')">Reset to default</button><span class="err" id="et-msg-'+k+'" style="margin:0"></span></div></div></details>';
    }).join('');
    var pu=t.policyUpdate||{subject:'',html:''};
    var bcToolbar='<div class="toolbar" style="margin:0 0 6px;gap:4px">'+tbtn('<b>B</b>','bold','broadcast')+tbtn('<i>I</i>','italic','broadcast')+tbtn('Heading','formatBlock:h3','broadcast')+tbtn('• List','insertUnorderedList','broadcast')+tbtn('Link','createLink','broadcast')+tbtn('🖼 Image','image','broadcast')+tbtn('Clear','removeFormat','broadcast')+'</div>';
    var broadcast='<div class="card"><h3 style="margin:0 0 4px;font:600 16px Space Grotesk">Send an announcement / policy update</h3>'+
      '<p class="meta">Email all organisations or members — e.g. to tell them a policy or legal document changed. Edit the customisable "Policy / legal document update" template below to change the default wording.</p>'+
      '<div class="field"><label>Subject</label><input id="et-sub-broadcast" style="width:100%" value="'+attr(pu.subject)+'"></div>'+
      '<div class="field"><label>Message</label>'+bcToolbar+'<div id="et-html-broadcast" contenteditable="true" class="wysiwyg">'+pu.html+'</div></div>'+
      '<div class="lim" style="margin-top:8px">Send to: <select id="bc-aud"><option value="orgs">Organisations (their contact email)</option><option value="members">All members</option><option value="all">Everyone</option></select>'+
      '<button class="ghost" onclick="etPreview(\'broadcast\')">Preview</button><button class="ghost" onclick="bcSend(true)">Send test to me</button><button class="go" onclick="bcSend(false)">Send to all</button></div>'+
      '<div class="meta" id="bc-res" style="margin-top:6px"></div></div>';
    document.getElementById('emails').innerHTML=broadcast+'<div class="card"><h3 style="margin:0 0 4px;font:600 16px Space Grotesk">Email templates</h3><p class="meta">Every lifecycle email the platform sends. Click one to edit. Format visually, add images, and preview — no HTML needed. Reset restores the built-in default.</p></div>'+cards;
  });
}
window.bcSend=function(test){
  var subject=document.getElementById('et-sub-broadcast').value.trim();
  var html=document.getElementById('et-html-broadcast').innerHTML;
  var audience=document.getElementById('bc-aud').value;
  if(!subject){ appToast('Add a subject first.','err'); return; }
  var doSend=function(){
    var res=document.getElementById('bc-res'); res.style.color='var(--muted)'; res.textContent='Sending…';
    fetch('/api/console/broadcast',{method:'POST',headers:H(),body:JSON.stringify({subject:subject,html:html,audience:audience,test:test})})
      .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error);return d;});})
      .then(function(d){ res.style.color='var(--accent)'; res.textContent=(test?'Test sent to you. ':'')+'Sent '+d.sent+' of '+d.total+(d.failed?(' ('+d.failed+' failed)'):'')+'.'; })
      .catch(function(e){ res.style.color='#C0392B'; res.textContent=e.message; });
  };
  if(test){ doSend(); return; }
  appConfirm({title:'Send to all',message:'Send this email now to all '+audience+'? It goes out immediately and cannot be unsent.',confirmText:'Send to all',danger:true}).then(function(ok){ if(ok)doSend(); });
};
// Toolbar command. onmousedown + preventDefault keeps the editor selection.
window.etCmd=function(e,cmd,k){
  e.preventDefault();
  document.getElementById('et-html-'+k).focus();
  if(cmd==='createLink'){ var url=prompt('Link URL (https://...)'); if(url) document.execCommand('createLink',false,url); return false; }
  if(cmd==='image'){ var iu=prompt('Image URL (https://... or a hosted picture)'); if(iu&&/^(https?:\/\/|data:image\/)/i.test(iu)) document.execCommand('insertHTML',false,'<img src="'+iu.replace(/"/g,'&quot;')+'" style="max-width:100%;border-radius:8px" alt="">'); return false; }
  if(cmd.indexOf('formatBlock:')===0){ document.execCommand('formatBlock',false,cmd.split(':')[1]); return false; }
  document.execCommand(cmd,false,null);
  return false;
};
window.etInsert=function(e,k,v){ e.preventDefault(); document.getElementById('et-html-'+k).focus(); document.execCommand('insertText',false,'{{'+v+'}}'); return false; };
// Render the email in an email-like frame, with placeholders filled with sample values.
window.etPreview=function(k){
  var subj=document.getElementById('et-sub-'+k).value, html=document.getElementById('et-html-'+k).innerHTML;
  var sample={orgName:'Riverside Trust',name:'Alex',inviterName:'Sam',setupUrl:'#',inviteUrl:'#',adminUrl:'#',resetUrl:'#',note:'(your note here)',ageDays:'45'};
  var filled=function(s){return String(s).replace(/\{\{\s*(\w+)\s*\}\}/g,function(_,v){return sample[v]!=null?sample[v]:'{{'+v+'}}';});};
  showEmailPreview(filled(subj),filled(html));
};
function showEmailPreview(subject,bodyHtml){
  var ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML='<div class="modal-card" style="max-width:560px;padding:0;overflow:hidden">'+
    '<div style="background:var(--soft);padding:14px 18px;border-bottom:1px solid var(--line)"><div class="meta" style="margin:0">Subject</div><div style="font-weight:600">'+esc(subject)+'</div></div>'+
    '<div style="background:#fff;color:#15162a;padding:22px;max-height:60vh;overflow:auto;font:400 15px/1.6 Inter">'+bodyHtml+'</div>'+
    '<div class="modal-acts" style="padding:12px 16px;border-top:1px solid var(--line)"><button class="go" data-a="x">Close</button></div></div>';
  ov.addEventListener('click',function(e){ if(e.target===ov||e.target.getAttribute('data-a')==='x') ov.remove(); });
  document.body.appendChild(ov);
}
window.saveTpl=function(k){
  var msg=document.getElementById('et-msg-'+k);
  fetch('/api/console/email-templates/'+k,{method:'PUT',headers:H(),body:JSON.stringify({subject:document.getElementById('et-sub-'+k).value,html:document.getElementById('et-html-'+k).innerHTML})})
    .then(function(r){return r.json();}).then(function(){ msg.style.color='var(--accent)'; msg.textContent='Saved.'; setTimeout(loadEmails,600); });
};
window.resetTpl=function(k){ appConfirm({title:'Reset email template',message:'Restore this template to its built-in default? Your customised version will be lost.',confirmText:'Reset to default',danger:true}).then(function(ok){ if(!ok)return; fetch('/api/console/email-templates/'+k,{method:'DELETE',headers:H()}).then(loadEmails); }); };

// ================= DESIGN =================
var navItems=[];
function loadDesign(){
  document.getElementById('design').innerHTML='<div class="card"><div class="tabs" id="dtabs" style="margin:0 0 14px">'+
    '<button class="tab on" data-d="menu">Menu</button>'+
    '<button class="tab" data-d="team">Team</button>'+
    '<button class="tab" data-d="/editor">Landing</button>'+
    '<button class="tab" data-d="/donate">Support</button>'+
    '<button class="tab" data-d="/about">About</button>'+
    '<button class="tab" data-d="/demo">Demo</button>'+
    '<button class="tab" data-d="/privacy">Privacy</button>'+
    '<button class="tab" data-d="/terms">Terms</button>'+
    '<button class="tab" data-d="/cookies">Cookies</button>'+
    '<button class="tab" data-d="/acceptable-use">Acceptable use</button>'+
    '<button class="tab" data-d="/dpa">DPA</button>'+
    '<button class="tab" data-d="/legal">Legal index</button>'+
    '</div><div id="dpane"></div></div>';
  document.querySelectorAll('#dtabs .tab').forEach(function(b){b.onclick=function(){document.querySelectorAll('#dtabs .tab').forEach(function(x){x.classList.remove('on')});b.classList.add('on');openDesign(b.dataset.d);};});
  openDesign('menu');
}
function openDesign(d){
  var pane=document.getElementById('dpane');
  if(d==='menu'){ fetch('/api/nav').then(function(r){return r.json();}).then(function(items){ navItems=items.slice(); pane.innerHTML='<div id="nav-editor"></div>'; renderNav(); }); return; }
  if(d==='team'){ fetch('/api/team').then(function(r){return r.json();}).then(function(t){ teamData=t; pane.innerHTML='<div id="team-editor"></div>'; renderTeamEditor(); }); return; }
  // Load the page in edit mode so its in-place visual editor (Edit button) appears.
  var src = d + (d.indexOf('?')<0?'?edit=1':'&edit=1');
  pane.innerHTML='<p class="meta" style="margin:0 0 8px">This page is editable here. Click <b>Edit page</b> (bottom-right of the preview), make changes, then Save and publish.</p><iframe src="'+src+'" style="width:100%;height:72vh;border:1px solid var(--line);border-radius:12px;background:#fff"></iframe>';
}
function syncNav(){ var rows=document.querySelectorAll('#nav-list .nav-row'); navItems=Array.prototype.map.call(rows,function(r){return {label:r.querySelector('.nl').value,href:r.querySelector('.nh').value,hidden:r.querySelector('.nhide').checked};}); }
function renderNav(){
  var rows=navItems.map(function(it,i){return '<div class="nav-row lim"><input class="nl" value="'+attr(it.label)+'" placeholder="Label"><input class="nh" value="'+attr(it.href)+'" placeholder="/path"><label style="font:500 12px Inter;display:flex;align-items:center;gap:4px"><input type="checkbox" class="nhide" '+(it.hidden?'checked':'')+'>Hide</label><button class="ghost" onclick="navMove('+i+',-1)">Up</button><button class="ghost" onclick="navMove('+i+',1)">Down</button><button class="no" onclick="navDel('+i+')">Remove</button></div>';}).join('');
  document.getElementById('nav-editor').innerHTML='<h3 style="margin:0 0 4px;font:600 16px Space Grotesk">Navigation menu</h3><p class="meta">Links shown in the site header. Tick Hide to keep a link off the menu without deleting it.</p><div id="nav-list">'+rows+'</div><div class="lim" style="margin-top:10px"><button class="ghost" onclick="navAdd()">Add link</button><button class="go" onclick="navSave()">Save menu</button></div><div class="err" id="naverr"></div>';
}
window.navAdd=function(){ syncNav(); navItems.push({label:'New link',href:'/'}); renderNav(); };
window.navDel=function(i){ syncNav(); navItems.splice(i,1); renderNav(); };
window.navMove=function(i,d){ syncNav(); var j=i+d; if(j<0||j>=navItems.length)return; var t=navItems[i];navItems[i]=navItems[j];navItems[j]=t; renderNav(); };
window.navSave=function(){ syncNav(); fetch('/api/console/nav',{method:'PUT',headers:H(),body:JSON.stringify({items:navItems})}).then(function(r){return r.json().then(function(d){var e=document.getElementById('naverr');e.style.color=r.ok?'var(--accent)':'#C0392B';e.textContent=r.ok?'Saved.':(d.error||'Failed');});}); };

// ---- Team editor ("the people behind it") ----
var teamData={heading:'The people behind it',style:'cards',members:[]};
var TEAM_STYLE_OPTS=[['cards','Cards'],['flashcard','Flashcard (flips on hover)'],['list','List'],['circles','Circles'],['minimal','Minimal'],['spotlight','Spotlight']];
function syncTeam(){
  teamData.heading=document.getElementById('tm-head').value;
  teamData.style=document.getElementById('tm-style').value;
  teamData.members=Array.prototype.map.call(document.querySelectorAll('#tm-list .tm-row'),function(r){
    return {name:r.querySelector('.tm-name').value,role:r.querySelector('.tm-role').value,description:r.querySelector('.tm-desc').value,imageUrl:r.querySelector('.tm-img').value};
  });
}
function renderTeamEditor(){
  var styleSel='<select id="tm-style">'+TEAM_STYLE_OPTS.map(function(o){return '<option value="'+o[0]+'"'+(teamData.style===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select>';
  var rows=(teamData.members||[]).map(function(m,i){
    return '<div class="tm-row card" style="padding:12px;margin-bottom:8px"><div class="row" style="gap:10px">'+
      '<div style="flex:1;min-width:200px"><label class="meta">Name</label><input class="tm-name" style="width:100%" value="'+attr(m.name)+'"></div>'+
      '<div style="flex:1;min-width:160px"><label class="meta">Role</label><input class="tm-role" style="width:100%" value="'+attr(m.role)+'"></div></div>'+
      '<div class="field" style="margin:8px 0 0"><label class="meta">Photo URL</label><input class="tm-img" style="width:100%" placeholder="https://… (leave blank for initials)" value="'+attr(m.imageUrl)+'"></div>'+
      '<div class="field" style="margin:8px 0 0"><label class="meta">Short description</label><textarea class="tm-desc" rows="2" style="width:100%">'+esc(m.description)+'</textarea></div>'+
      '<div class="lim"><button class="ghost" onclick="teamMove('+i+',-1)">Up</button><button class="ghost" onclick="teamMove('+i+',1)">Down</button><button class="no" onclick="teamDel('+i+')">Remove</button></div></div>';
  }).join('');
  document.getElementById('team-editor').innerHTML='<h3 style="margin:0 0 4px;font:600 16px Space Grotesk">Team — "the people behind it"</h3>'+
    '<p class="meta">Shown on the About page. Add people with a photo and description, and pick a layout style.</p>'+
    '<div class="field"><label>Section heading</label><input id="tm-head" style="width:100%" value="'+attr(teamData.heading)+'"></div>'+
    '<div class="field"><label>Layout style</label>'+styleSel+'</div>'+
    '<div id="tm-list" style="margin-top:10px">'+rows+'</div>'+
    '<div class="lim"><button class="ghost" onclick="teamAdd()">Add person</button><button class="go" onclick="teamSave()">Save team</button><a class="ghost" href="/about" target="_blank" style="text-decoration:none">Preview ↗</a><span class="err" id="tm-msg" style="margin:0"></span></div>';
}
window.teamAdd=function(){ syncTeam(); teamData.members.push({name:'New person',role:'',description:'',imageUrl:''}); renderTeamEditor(); };
window.teamDel=function(i){ syncTeam(); teamData.members.splice(i,1); renderTeamEditor(); };
window.teamMove=function(i,d){ syncTeam(); var j=i+d; if(j<0||j>=teamData.members.length)return; var t=teamData.members[i];teamData.members[i]=teamData.members[j];teamData.members[j]=t; renderTeamEditor(); };
window.teamSave=function(){ syncTeam(); var msg=document.getElementById('tm-msg');
  fetch('/api/console/team',{method:'PUT',headers:H(),body:JSON.stringify(teamData)}).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error);return d;});})
    .then(function(){ msg.style.color='var(--accent)'; msg.textContent='Saved.'; }).catch(function(e){ msg.style.color='#C0392B'; msg.textContent=e.message; }); };

// ================= SECURITY =================
function loadSecurity(){
  fetch('/api/console/policy',{headers:H()}).then(function(r){return r.json();}).then(function(p){
    function ck(id,on){return '<label style="display:block;margin:6px 0;font:500 14px Inter"><input type="checkbox" id="'+id+'" '+(on?'checked':'')+' style="width:auto;margin-right:8px;vertical-align:-1px">';}
    document.getElementById('security').innerHTML='<details class="acc" open><summary>Password policy</summary><div class="acc-body">'+
      '<p class="meta" style="margin-top:0">Applies whenever a password is set or changed.</p>'+
      '<div class="lim" style="margin-top:10px">Minimum length: <input type="number" min="8" max="64" id="pmin" value="'+(p.minLength||8)+'"></div>'+
      ck('pupper',p.requireUpper)+'Require an uppercase letter</label>'+
      ck('pnum',p.requireNumber)+'Require a number</label>'+
      ck('psym',p.requireSymbol)+'Require a symbol</label>'+
      ck('pmfa',p.requireMfa)+'Require two factor authentication (MFA)</label>'+
      '<div class="lim" style="margin-top:10px"><button class="go" onclick="saveSecurity()">Save policy</button><span class="err" id="secmsg" style="margin:0"></span></div></div></details>'+

      '<details class="acc"><summary>Password expiry &amp; reminders</summary><div class="acc-body">'+
      '<p class="meta" style="margin-top:0">Force a reset after a set age, and email reminders as the password gets old.</p>'+
      '<div class="lim" style="margin-top:10px">Expire passwords after <input type="number" min="0" max="3650" id="pexp" value="'+(p.expiryDays||0)+'"> days <span class="meta">(0 = never)</span></div>'+
      '<div class="lim">Email reminders at these password ages (days, comma separated): <input style="width:200px" id="prem" value="'+attr((p.reminderDays||[]).join(', '))+'"></div>'+
      '<div class="lim" style="margin-top:10px"><button class="go" onclick="saveSecurity()">Save</button> <span class="meta">e.g. 30, 60, 90</span></div></div></details>'+

      '<details class="acc"><summary>Account lockout</summary><div class="acc-body">'+
      '<p class="meta" style="margin-top:0">Lock an account after repeated wrong passwords. Members are unlocked by an admin in their organisation; org admins are unlocked by you here in Members.</p>'+
      '<div class="lim" style="margin-top:10px">Lock after <input type="number" min="0" max="20" id="plk" value="'+(p.lockoutThreshold||0)+'"> wrong attempts <span class="meta">(0 = never)</span></div>'+
      '<div class="lim">Stay locked for <input type="number" min="1" max="1440" id="plm" value="'+(p.lockoutMinutes||30)+'"> minutes</div>'+
      '<div class="lim" style="margin-top:10px"><button class="go" onclick="saveSecurity()">Save</button></div></div></details>'+

      '<details class="acc"><summary>Email delivery test</summary><div class="acc-body">'+
      '<p class="meta" style="margin-top:0">Send a test message to check your email setup (Resend, Brevo or SMTP). If it fails the exact reason is shown.</p>'+
      '<div class="lim" style="margin-top:10px"><input id="testto" type="email" placeholder="your@email.com"><button class="go" onclick="testEmail()">Send test email</button></div><div class="err" id="testres" style="margin-top:8px;white-space:normal"></div></div></details>';
  });
}
window.testEmail=function(){
  var res=document.getElementById('testres');res.style.color='var(--muted)';res.textContent='Sending...';
  fetch('/api/console/test-email',{method:'POST',headers:H(),body:JSON.stringify({to:document.getElementById('testto').value.trim()})})
   .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
   .then(function(x){ if(x.ok){res.style.color='var(--accent)';res.textContent='Sent from '+x.d.from+' via '+x.d.method+'. Check the inbox and spam.';} else {res.style.color='#C0392B';res.textContent=x.d.error;} })
   .catch(function(){res.style.color='#C0392B';res.textContent='Request failed.';});
};
window.saveSecurity=function(){
  var rem=(document.getElementById('prem')?document.getElementById('prem').value:'').split(',').map(function(s){return parseInt(s.trim(),10);}).filter(function(n){return n>0;});
  fetch('/api/console/policy',{method:'PUT',headers:H(),body:JSON.stringify({
    minLength:document.getElementById('pmin').value,
    requireUpper:document.getElementById('pupper').checked,
    requireNumber:document.getElementById('pnum').checked,
    requireSymbol:document.getElementById('psym').checked,
    requireMfa:document.getElementById('pmfa').checked,
    expiryDays:document.getElementById('pexp').value,
    reminderDays:rem,
    lockoutThreshold:document.getElementById('plk').value,
    lockoutMinutes:document.getElementById('plm').value
  })}).then(function(r){return r.json();}).then(function(){var m=document.getElementById('secmsg');if(m){m.style.color='var(--accent)';m.textContent='Saved.';}setTimeout(loadSecurity,600);});
};

// boot: the cookie (if any) is sent automatically; ask the server who we are.
fetch('/api/console/me',{headers:H(),credentials:'same-origin'}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){role=d.role;showApp();}).catch(showLogin);
