<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage your booking · Enjeeoh</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/theme.js"></script>
<style>
  :root{--accent:#0F9D7A;--ink:#16182D;--muted:#6B7280;--line:#ECEDF4;--bg:#FBFBFE;--card:#FFF}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
  .wrap{max-width:440px;margin:60px auto;padding:0 20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px}
  h1{font:700 22px 'Space Grotesk';margin:0 0 4px}
  .eyebrow{font:600 12px Inter;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}
  .meta{color:var(--muted);font-size:14px}
  label{display:block;font:600 13px Inter;margin:14px 0 6px}
  input{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px;font:400 14px Inter;background:var(--bg);color:var(--ink)}
  button{border:0;border-radius:10px;padding:12px 16px;font:600 14px Inter;cursor:pointer}
  .go{background:var(--accent);color:#fff} .ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .no{background:#fff;color:#991B1B;border:1px solid #FCA5A5}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .err{color:#C0392B;font-size:13px;margin-top:10px;min-height:16px}
  .ok{color:var(--accent)}
  .hide{display:none}
  .modal-ov{position:fixed;inset:0;background:rgba(10,12,22,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px}
  .modal-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:380px;width:100%;box-shadow:0 24px 60px rgba(10,12,40,.3)}
  .modal-card h3{margin:0 0 8px;font:700 17px 'Space Grotesk'} .modal-card p{margin:0 0 16px;color:var(--muted);font-size:14px}
  .modal-acts{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <p class="eyebrow">Your booking</p>
    <div id="view"><h1>Loading…</h1></div>
  </div>
</div>
<script>
const parts=location.pathname.split('/').filter(Boolean); // manage/:id/:token
const ID=parts[1], TOKEN=parts[2];
// Only valid when opened from a real http(s) /manage/:id/:token link (e.g. the
// one in your booking email). Build an absolute API URL so fetch can't mis-parse.
const VALID=/^https?:$/.test(location.protocol) && parts[0]==='manage' && !!ID && !!TOKEN;
const base=VALID ? (location.origin+'/api/manage/'+encodeURIComponent(ID)+'/'+encodeURIComponent(TOKEN)) : '';
let DATA=null;
function esc(s){var d=document.createElement('div');d.textContent=(s==null?'':s);return d.innerHTML;}
function appConfirm(opts){ opts=opts||{}; return new Promise(function(resolve){
  var ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML='<div class="modal-card"><h3>'+esc(opts.title||'Please confirm')+'</h3><p>'+esc(opts.message||'')+'</p><div class="modal-acts"><button class="ghost" data-a="c">'+esc(opts.cancelText||'Keep it')+'</button><button class="'+(opts.danger?'no':'go')+'" data-a="o">'+esc(opts.confirmText||'Confirm')+'</button></div></div>';
  function close(v){ ov.remove(); resolve(v); }
  ov.addEventListener('click',function(e){ if(e.target===ov) close(false); });
  ov.querySelector('[data-a=c]').onclick=function(){ close(false); };
  ov.querySelector('[data-a=o]').onclick=function(){ close(true); };
  document.body.appendChild(ov);
}); }
async function load(){
  if(!VALID){ document.getElementById('view').innerHTML='<h1>Open from your email</h1><p class="meta">Please open the “Manage booking” link from your booking confirmation or reminder email.</p>'; return; }
  try{
    const r=await fetch(base); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Not found'); DATA=d; render();
  }catch(e){ document.getElementById('view').innerHTML='<h1>Booking not found</h1><p class="meta">'+esc(e.message)+'</p>'; }
}
function render(){
  if(DATA.status==='cancelled'){ document.getElementById('view').innerHTML='<h1>Booking cancelled</h1><p class="meta">This booking has been cancelled. You can make a new one on the booking page.</p>'; return; }
  document.getElementById('view').innerHTML=
    '<h1>'+esc(DATA.title)+'</h1>'+
    '<p class="meta">'+esc(DATA.when)+' · with '+esc(DATA.memberName)+'</p>'+
    (DATA.locationText?'<p class="meta">'+esc(DATA.locationText)+'</p>':'')+
    '<div class="row"><button class="ghost" id="rs">Reschedule</button><button class="no" id="cx">Cancel booking</button></div>'+
    '<div id="rsbox" class="hide" style="margin-top:8px"><label>New date &amp; time</label><input type="datetime-local" id="rsinput"><div class="row" style="margin-top:10px"><button class="go" id="rssave">Save new time</button></div></div>'+
    '<div class="err" id="err"></div>';
  document.getElementById('cx').onclick=async()=>{ if(!await appConfirm({title:'Cancel booking',message:'Cancel this booking? This cannot be undone.',confirmText:'Cancel booking',danger:true}))return;
    const r=await fetch(base+'/cancel',{method:'POST'}); if(r.ok){ DATA.status='cancelled'; render(); } else { document.getElementById('err').textContent='Could not cancel.'; } };
  document.getElementById('rs').onclick=()=>{ document.getElementById('rsbox').classList.toggle('hide'); };
  document.getElementById('rssave').onclick=async()=>{
    const v=document.getElementById('rsinput').value; const err=document.getElementById('err'); err.textContent='';
    if(!v){ err.textContent='Pick a new date and time.'; return; }
    const r=await fetch(base+'/reschedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({start:new Date(v).toISOString()})});
    const d=await r.json(); if(!r.ok){ err.textContent=d.error||'Could not reschedule.'; return; }
    err.className='err ok'; err.textContent='Done! Your booking was moved. Check your email.'; await load();
  };
}
load();
</script>
<script src="/nav.js"></script>
</body>
</html>
