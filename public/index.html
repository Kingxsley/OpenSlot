<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enjeeoh, free scheduling for NGOs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#0F9D7A;--accent2:#11B98F;--bg:#FBFBFE;--fg:#15162A;--muted:#6C6F84;--card:#FFFFFF;--line:#ECEDF4;--soft:#F4F4FA;--shadow:0 24px 60px rgba(12,14,40,.16);--anim-name:fadeUp}
  .dark{--bg:#0C0D17;--fg:#F3F4FB;--muted:#9DA1B8;--card:#16182A;--line:#242639;--soft:#1B1D2E;--shadow:0 24px 60px rgba(0,0,0,.5)}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .nav{max-width:1080px;margin:0 auto;padding:22px 28px;display:flex;justify-content:space-between;align-items:center}
  .logo{font:700 18px 'Space Grotesk';letter-spacing:-.01em}
  .nav a{color:var(--fg);text-decoration:none;font:600 14px Inter;margin-left:18px}
  .page{max-width:1080px;margin:0 auto;padding:44px 28px 64px;position:relative}
  .glow{position:absolute;top:0;right:-40px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--accent) 24%,transparent),transparent 68%);filter:blur(10px);pointer-events:none;z-index:0}
  .hero{position:relative;z-index:1;max-width:560px}
  .badge{display:inline-block;font:600 11px Inter;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 32%,var(--line));border-radius:30px;padding:7px 14px;background:color-mix(in srgb,var(--accent) 8%,transparent)}
  h1{font:700 52px/1.06 'Space Grotesk',system-ui,sans-serif;letter-spacing:-.025em;margin:20px 0 16px}
  h1 .g{background:linear-gradient(105deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font:400 18px/1.55 Inter;color:var(--muted);max-width:460px;margin:0 0 30px}
  .cta{display:flex;gap:12px;flex-wrap:wrap}
  .b1{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:14px 26px;font:600 15px Inter;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 38%,transparent);transition:transform .15s,box-shadow .15s}
  .b1:hover{transform:translateY(-2px);box-shadow:0 12px 28px color-mix(in srgb,var(--accent) 45%,transparent)}
  .b2{background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:12px;padding:14px 26px;font:600 15px Inter;cursor:pointer;text-decoration:none;display:inline-block;transition:border-color .15s}
  .b2:hover{border-color:var(--accent)}
  .floatcard{position:absolute;right:18px;top:80px;width:230px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);z-index:2}
  .av{width:34px;height:34px;border-radius:50%;background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent);display:flex;align-items:center;justify-content:center;font:600 13px 'Space Grotesk';margin-bottom:10px}
  .floatcard h4{margin:0 0 2px;font:600 15px 'Space Grotesk'} .floatcard p{margin:0 0 12px;font:400 12px Inter;color:var(--muted)}
  .cal{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .cal span{aspect-ratio:1;border-radius:7px;background:var(--soft);display:flex;align-items:center;justify-content:center;font:600 11px Inter;color:var(--muted)}
  .cal span.on{background:var(--accent);color:#fff}
  .confirm{margin-top:12px;display:flex;align-items:center;gap:7px;font:600 12px Inter;color:var(--accent)}
  .feat{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:54px;position:relative;z-index:1}
  .fcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;transition:transform .15s,border-color .15s}
  .fcard:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}
  .fcard .ic{width:30px;height:30px;color:var(--accent);margin-bottom:12px}
  .fcard h5{margin:0 0 6px;font:600 15px 'Space Grotesk'} .fcard p{margin:0;font:400 13px/1.55 Inter;color:var(--muted)}
  footer{max-width:1080px;margin:0 auto;padding:30px 28px 50px;color:var(--muted);font:400 13px Inter}
  .an{opacity:0}
  .play .an{animation:var(--anim-name,fadeUp) .6s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:var(--d)}
  .an-none .an{opacity:1;animation:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes zoomIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
  @keyframes blurIn{from{opacity:0;filter:blur(12px)}to{opacity:1;filter:blur(0)}}
  @keyframes popIn{0%{opacity:0;transform:scale(.82)}60%{opacity:1;transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes clipUp{from{opacity:0;clip-path:inset(45% 0 0 0);transform:translateY(14px)}to{opacity:1;clip-path:inset(0 0 0 0);transform:none}}
  @keyframes riseBlur{from{opacity:0;transform:translateY(26px);filter:blur(8px)}to{opacity:1;transform:none;filter:blur(0)}}
  @keyframes flipIn{from{opacity:0;transform:perspective(600px) rotateX(-20deg) translateY(12px)}to{opacity:1;transform:none}}
  @media (max-width:760px){h1{font-size:38px} .floatcard{display:none} .feat{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div class="nav"><a href="/" class="logo">Enjeeoh</a><div id="nav-links"></div></div>
  <div class="page play" id="page">
    <div class="glow"></div>
    <div class="floatcard an" style="--d:.45s">
      <div class="av">JC</div><h4>Intro call</h4><p>Thursday, 2:30 pm</p>
      <div class="cal"><span>M</span><span>T</span><span class="on">W</span><span>T</span><span>9</span><span>10</span><span class="on">11</span><span>1</span></div>
      <div class="confirm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg> Confirmed</div>
    </div>
    <div class="hero">
      <span class="badge an" id="badge" style="--d:0s"></span>
      <h1 class="an" style="--d:.08s"><span class="g" id="headLead"></span> <span id="headRest"></span></h1>
      <p class="sub an" id="sub" style="--d:.16s"></p>
      <div class="cta an" style="--d:.24s"><a class="b1" id="cta1" href="/signup"></a><a class="b2" id="cta2" href="/admin"></a></div>
    </div>
    <div class="feat" id="feat"></div>
  </div>
  <footer>Enjeeoh. Free for verified non-profits. &nbsp;·&nbsp; <a href="/privacy" style="color:inherit">Privacy</a> &nbsp;·&nbsp; <a href="/terms" style="color:inherit">Terms</a> &nbsp;·&nbsp; <a href="/cookies" style="color:inherit">Cookies</a> &nbsp;·&nbsp; <a href="/legal" style="color:inherit">All policies</a></footer>
<script>
var ICONS=[
 '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 4a3 3 0 0 1 0 6"/><path d="M21 20a6 6 0 0 0-3-5"/></svg>',
 '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l5-3v10l-5-3z"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>',
 '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18z"/></svg>'];
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
fetch('/api/landing').then(function(r){return r.json();}).then(function(c){
  var root=document.documentElement, page=document.getElementById('page');
  root.style.setProperty('--accent',c.accent||'#0F9D7A');
  root.style.setProperty('--accent2',c.accent2||c.accent||'#11B98F');
  root.style.setProperty('--anim-name',(c.anim==='none')?'none':(c.anim||'fadeUp'));
  if(c.theme==='dark') document.body.classList.add('dark');
  if(c.anim==='none') page.classList.add('an-none');
  document.getElementById('badge').textContent=c.badge||'';
  document.getElementById('headLead').textContent=c.headLead||'';
  document.getElementById('headRest').textContent=c.headRest||'';
  document.getElementById('sub').textContent=c.sub||'';
  document.getElementById('cta1').textContent=c.ctaPrimary||'Apply';
  document.getElementById('cta2').textContent=c.ctaSecondary||'Sign in';
  var feat=document.getElementById('feat');
  (c.features||[]).slice(0,3).forEach(function(f,i){
    var d=document.createElement('div');d.className='fcard an';d.style.setProperty('--d',(0.30+i*0.08)+'s');
    d.innerHTML=ICONS[i]+'<h5>'+esc(f.title)+'</h5><p>'+esc(f.body)+'</p>';feat.appendChild(d);
  });
}).catch(function(){});
</script>
<script src="/nav.js"></script>
</body>
</html>
