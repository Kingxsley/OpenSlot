<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enjeeoh NGO verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#0F9D7A;--ink:#16182D;--muted:#6B7280;--line:#ECEDF3;--bg:#FBFBFD;--soft:#F3F4F8}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:32px 20px 80px}
  h1{font:700 24px 'Space Grotesk';margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 24px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  label{display:block;font:600 13px Inter;margin:0 0 6px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:400 14px Inter;margin-bottom:14px}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:9px 15px;font:600 14px Inter;cursor:pointer}
  button.reject{background:#fff;border:1px solid #F1C7C2;color:#C0392B}
  button.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .app{border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .app h3{margin:0 0 4px;font:600 17px 'Space Grotesk'}
  .meta{color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 10px}
  .meta b{color:var(--ink);font-weight:600}
  .mission{font-size:14px;background:var(--soft);border-radius:10px;padding:12px 14px;margin:0 0 14px}
  .status{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
  .s-pending{background:#FDF3E0;color:#9A6A12}
  .s-approved{background:color-mix(in srgb,var(--accent) 16%,transparent);color:#0B6B53}
  .s-rejected{background:#FBEAEA;color:#A33}
  .actions{display:flex;gap:10px;align-items:flex-start}
  .actions input{margin:0;flex:1}
  .filters{display:flex;gap:8px;margin-bottom:18px}
  .filters button{background:#fff;border:1px solid var(--line);color:var(--muted)}
  .filters button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .login{max-width:380px;margin:80px auto}
  .err{color:#C0392B;font-size:14px;margin-top:8px}
  .hidden{display:none}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="login">
    <h1>Verification console</h1>
    <p class="sub">Reviewer access only.</p>
    <div class="panel">
      <label>Email</label><input id="li-email" type="email">
      <label>Password</label><input id="li-pass" type="password">
      <button id="li-btn" style="width:100%">Sign in</button>
      <div class="err" id="li-err"></div>
    </div>
  </div>

  <div id="console" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><h1>NGO verification</h1><p class="sub" id="count"></p></div>
      <button class="ghost" id="logout">Log out</button>
    </div>
    <div class="filters">
      <button data-f="pending" class="on">Pending</button>
      <button data-f="approved">Approved</button>
      <button data-f="rejected">Rejected</button>
      <button data-f="all">All</button>
    </div>
    <div id="list"></div>
  </div>
</div>
<script>
let token = localStorage.getItem('os_rev') || '';
let APPS = [], filter = 'pending';

async function api(path, opts={}){
  opts.headers = Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+token}, opts.headers||{});
  const r = await fetch(path, opts); const d = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||'Request failed'); return d;
}

document.getElementById('li-btn').onclick = async () => {
  const err = document.getElementById('li-err'); err.textContent='';
  try{
    const r = await fetch('/api/review/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:document.getElementById('li-email').value.trim(),password:document.getElementById('li-pass').value})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error);
    token = d.token; localStorage.setItem('os_rev', token); boot();
  }catch(e){ err.textContent = e.message; }
};
document.getElementById('logout').onclick = () => { localStorage.removeItem('os_rev'); location.reload(); };
document.querySelectorAll('.filters button').forEach(b => b.onclick = () => {
  filter = b.dataset.f;
  document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  render();
});

async function boot(){
  try{ APPS = await api('/api/review/applications'); }
  catch(e){ document.getElementById('login').classList.remove('hidden'); document.getElementById('console').classList.add('hidden'); return; }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('console').classList.remove('hidden');
  render();
}

function render(){
  const list = document.getElementById('list');
  const items = APPS.filter(a => filter==='all' ? true : a.status===filter);
  const pend = APPS.filter(a=>a.status==='pending').length;
  document.getElementById('count').textContent = `${pend} pending · ${APPS.length} total`;
  if(!items.length){ list.innerHTML = '<p class="sub">Nothing here.</p>'; return; }
  list.innerHTML = '';
  items.forEach(a => {
    const el = document.createElement('div'); el.className='app';
    const created = new Date(a.createdAt).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
    el.innerHTML = `
      <span class="status s-${a.status}">${a.status}</span>
      <h3>${a.name}</h3>
      <p class="meta"><b>Contact:</b> ${a.contactName||'Not given'} · ${a.email}<br>
        <b>Country:</b> ${a.country||'Not given'} &nbsp; <b>Reg:</b> ${a.registrationId||'Not given'}<br>
        <b>Website:</b> ${a.website?`<a href="${a.website}" target="_blank">${a.website}</a>`:'Not given'} &nbsp; <b>Applied:</b> ${created}<br>
        <b>Booking URL:</b> /book/${a.slug}</p>
      ${a.mission?`<div class="mission">${a.mission}</div>`:''}
      ${a.reviewNote?`<p class="meta"><b>Note:</b> ${a.reviewNote}</p>`:''}
      ${a.status==='pending'?`<div class="actions">
        <input placeholder="Optional note (sent to applicant)" id="note-${a.id}">
        <button data-approve="${a.id}">Approve</button>
        <button class="reject" data-reject="${a.id}">Reject</button>
      </div>`:''}`;
    list.appendChild(el);
  });
  list.querySelectorAll('[data-approve]').forEach(b=>b.onclick=()=>decide(b.dataset.approve,'approved'));
  list.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>decide(b.dataset.reject,'rejected'));
}

async function decide(id, decision){
  const note = (document.getElementById('note-'+id)||{}).value || '';
  try{ await api('/api/review/'+id+'/decision',{method:'POST',body:JSON.stringify({decision,note})}); boot(); }
  catch(e){ alert(e.message); }
}

if(token) boot(); else document.getElementById('login').classList.remove('hidden');
</script>
</body>
</html>
